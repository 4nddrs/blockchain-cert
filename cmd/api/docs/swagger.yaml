basePath: /api/v1
host: localhost:8080
info:
  contact:
    email: support@blockchain-cert.com
    name: API Support
  description: |-
    API for registering and verifying blockchain-based certificates on Ethereum
    Allows registration of PDF certificates with metadata and verification through document hash
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  title: Blockchain Certificate API
  version: "1.0"
paths: {}
schemes:
- http
- https
securityDefinitions:
  ApiKeyAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
